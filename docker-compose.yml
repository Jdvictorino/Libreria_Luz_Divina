version: '3.8'

services:
  web:
    build: .
    container_name: libreria_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: libreria
      DB_USER: root
      DB_PASS: root_password
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: libreria_db
    ports:
      - "33060:3306" # We use 33060 to avoid clashing with the local XAMPP MySQL running on 3306
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: libreria
    volumes:
      # MySQL auto-executes .sql files found in /docker-entrypoint-initdb.d upon initialization
      - ./db:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql

volumes:
  db_data:
